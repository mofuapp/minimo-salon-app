<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#D4536F">
<title>ミニモサロン帳</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<link rel="icon" href="icon-192.svg" type="image/svg+xml">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FAF7F8;--card:#fff;--ink:#2D2A2B;--ink-soft:#6B6568;--ink-light:#A39DA0;
  --accent:#D4536F;--accent-soft:#FCE8ED;--line:#EDE8EA;
  --nav-h:72px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  --radius:16px;--font:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--ink);overflow:hidden}
body{display:flex;flex-direction:column}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;padding-top:var(--safe-top);z-index:1}
.screen.active{display:flex}
.scroll-body{flex:1;overflow-y:auto;padding:0 16px calc(var(--nav-h) + var(--safe-bottom) + 16px);-webkit-overflow-scrolling:touch}
.page-head{padding:16px 16px 8px}
.page-title{font-size:21px;font-weight:800}
.page-sub{font-size:12px;color:var(--ink-soft);margin-top:4px;line-height:1.5}
.block{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.block-label{font-size:11px;font-weight:700;color:var(--ink-soft);margin-bottom:8px}
.chip-row{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:8px 12px;border-radius:999px;border:1.5px solid var(--line);background:#fff;font-size:12px;font-weight:700;color:var(--ink-soft)}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.btn{display:flex;align-items:center;justify-content:center;width:100%;padding:14px;border-radius:14px;border:none;font:inherit;font-size:15px;font-weight:800;cursor:pointer;touch-action:manipulation}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--accent-soft);color:var(--accent)}
.btn-ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
.btn-danger{background:#FFF0F0;color:#C43D3D;border:1.5px solid #F5D0D0}
.btn+.btn{margin-top:8px}
.stat{font-size:12px;font-weight:700;color:var(--accent);margin-top:8px}
.salon-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:8px}
.salon-name{font-size:15px;font-weight:800;margin-bottom:4px}
.salon-meta{font-size:12px;color:var(--ink-soft);line-height:1.55}
.badge{display:inline-block;background:var(--accent-soft);color:var(--accent);font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;margin-right:6px}
.empty{padding:36px 12px;text-align:center;color:var(--ink-light);font-size:13px;line-height:1.7}
.step{display:flex;gap:10px;margin-bottom:12px;font-size:13px;line-height:1.55;color:var(--ink-soft)}
.step-num{flex:0 0 22px;height:22px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center}
.bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:20;display:flex;background:#fff;border-top:1px solid var(--line);padding-bottom:var(--safe-bottom);height:calc(var(--nav-h) + var(--safe-bottom))}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;font:inherit;font-size:10px;font-weight:700;color:var(--ink-light)}
.nav-btn svg{width:22px;height:22px}
.nav-btn.on{color:var(--accent)}
.sheet-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:30}
.sheet-bg.open{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:31;background:#fff;border-radius:18px 18px 0 0;padding:12px 16px calc(18px + var(--safe-bottom));transform:translateY(110%);transition:transform .25s}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--line);border-radius:99px;margin:0 auto 12px}
.sheet-title{font-size:16px;font-weight:800;margin-bottom:10px}
.toast{position:fixed;left:50%;bottom:calc(var(--nav-h) + var(--safe-bottom) + 12px);transform:translateX(-50%) translateY(120px);opacity:0;background:rgba(45,42,43,.9);color:#fff;padding:9px 16px;border-radius:999px;font-size:12px;font-weight:700;z-index:40;transition:.25s}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
input[type=file]{display:none}
</style>
</head>
<body>

<div class="screen active" id="screen-import">
  <div class="page-head">
    <div class="page-title">CSV取込</div>
    <div class="page-sub">スクレイプは旧Streamlit版、管理はこのアプリ</div>
    <div class="stat" id="importStat"></div>
  </div>
  <div class="scroll-body" id="importBody"></div>
</div>

<div class="screen" id="screen-list">
  <div class="page-head">
    <div class="page-title">サロンリスト</div>
    <div class="page-sub" id="listSub">登録データ一覧</div>
  </div>
  <div class="scroll-body" id="listBody"></div>
</div>

<div class="screen" id="screen-export">
  <div class="page-head">
    <div class="page-title">出力</div>
    <div class="page-sub">スプシコピー・CSV・復元</div>
  </div>
  <div class="scroll-body" id="exportBody"></div>
</div>

<nav class="bottom-nav">
  <button type="button" class="nav-btn on" data-screen="import" onclick="switchScreen('import')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg><span>取込</span>
  </button>
  <button type="button" class="nav-btn" data-screen="list" onclick="switchScreen('list')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg><span>リスト</span>
  </button>
  <button type="button" class="nav-btn" data-screen="export" onclick="switchScreen('export')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15V3M7 10l5 5 5-5M5 21h14"/></svg><span>出力</span>
  </button>
</nav>

<div class="sheet-bg" id="sheet-bg-clear" onclick="closeSheet('clear')"></div>
<div class="sheet" id="sheet-clear">
  <div class="sheet-handle"></div>
  <div class="sheet-title">すべてのデータを削除しますか？</div>
  <p style="font-size:13px;color:var(--ink-soft);margin-bottom:14px;line-height:1.6">端末に保存したサロンがすべて消えます。</p>
  <button type="button" class="btn btn-danger" onclick="confirmClear()">削除する</button>
  <button type="button" class="btn btn-ghost" onclick="closeSheet('clear')">キャンセル</button>
</div>

<input type="file" id="csvFile" accept=".csv,text/csv" onchange="onCsvFile(event)">
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'minimo_salon_v2';
const STREAMLIT_URL = 'https://vhpzkrjr2emhhke.streamlit.app';
const CATEGORIES = { nail:'ネイル', eyelash:'マツエク・マツパ', eyebrow:'眉毛', relaxation:'エステ・リラク', other:'その他美容' };

const state = {
  salons: [],
  sessionNewUrls: [],
  listFilters: { genres: [], maxLikes: 100, updatePreset: 'off' }
};

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('show'),2200); }

function load(){
  try{
    const d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');
    if(d){
      if(d.salons) state.salons=d.salons;
      if(d.listFilters) Object.assign(state.listFilters,d.listFilters);
    }
  }catch(e){}
  migrate();
}
function migrate(){
  const old=localStorage.getItem('minimo_salon_app_v1');
  if(old && !state.salons.length){ try{ const d=JSON.parse(old); if(d.salons) state.salons=d.salons; save(); }catch(e){} }
  state.salons=dedupe(state.salons);
}
function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ salons:state.salons, listFilters:state.listFilters }));
}

function dedupe(list){
  const m=new Map();
  list.forEach(s=>{ if(s&&s.url){ const p=m.get(s.url); if(!p||(s.fetchedAt||'')>(p.fetchedAt||'')) m.set(s.url,s); }});
  return [...m.values()];
}

function addFromRows(rows){
  const existing=new Set(state.salons.map(s=>s.url)); let n=0;
  rows.forEach(r=>{
    const url=String(r.url||r['サロンURL']||'').trim(); if(!url||existing.has(url)) return;
    const phone=String(r.phone||r['電話番号']||'').replace(/^'|'/g,'').replace(/\D/g,'');
    const fetched=String(r.fetchedAt||r['取得日時']||'').trim();
    state.salons.push({
      id:uid(),
      name:String(r.name||r['サロン名']||'').trim(),
      genre:String(r.genre||r['ジャンル']||'その他美容').trim(),
      address:String(r.address||r['住所']||'').trim(),
      phone,
      url,
      likes:parseInt(r.likes||r['いいね数']||0,10)||0,
      updatedAt:String(r.updatedAt||r['最終更新日']||'').slice(0,10),
      fetchedAt:fetched.slice(0,10)||todayStr()
    });
    existing.add(url); state.sessionNewUrls.push(url); n++;
  });
  state.salons=dedupe(state.salons); save(); return n;
}

function filterSalons(list){
  let out=list.slice();
  if(state.listFilters.genres.length) out=out.filter(s=>state.listFilters.genres.includes(s.genre));
  out=out.filter(s=>s.likes<=state.listFilters.maxLikes);
  if(state.listFilters.updatePreset!=='off'){
    const days=parseInt(state.listFilters.updatePreset,10);
    const d=new Date(); d.setDate(d.getDate()-days);
    const min=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    out=out.filter(s=>s.updatedAt&&s.updatedAt>=min);
  }
  return out.sort((a,b)=>(b.updatedAt||'').localeCompare(a.updatedAt||'')||a.likes-b.likes);
}

function toTsv(list){
  const h=['サロン名','ジャンル','住所','電話番号','サロンURL','いいね数','最終更新日','取得日時'];
  const lines=[h.join('\t')];
  list.forEach(s=>{
    const ph=s.phone?("'"+s.phone):'';
    lines.push([s.name,s.genre,s.address,ph,s.url,s.likes,s.updatedAt,s.fetchedAt].join('\t'));
  });
  return lines.join('\n');
}

function chips(vals, selected, fn, labels){
  return vals.map((v,i)=>{
    const on=(Array.isArray(selected)?selected.includes(v):selected===v)?' on':'';
    const label=labels?labels[i]:v;
    return '<button type="button" class="chip'+on+'" onclick="'+fn+'(\''+v+'\')">'+esc(label)+'</button>';
  }).join('');
}

function renderImport(){
  document.getElementById('importStat').textContent='登録 '+state.salons.length+'件';
  document.getElementById('importBody').innerHTML=
    '<div class="block">'+
      '<div class="block-label">使い方</div>'+
      '<div class="step"><span class="step-num">1</span><span>旧版Streamlitでスクレイピング</span></div>'+
      '<div class="step"><span class="step-num">2</span><span>「CSVを保存」でファイルをダウンロード</span></div>'+
      '<div class="step"><span class="step-num">3</span><span>下のボタンからCSVを取り込む</span></div>'+
      '<button type="button" class="btn btn-secondary" onclick="openStreamlit()">🖥️ 旧版を開く（Streamlit）</button>'+
    '</div>'+
    '<div class="block">'+
      '<button type="button" class="btn btn-primary" onclick="pickCsv()">📂 CSVを取り込む</button>'+
      '<p style="font-size:11px;color:var(--ink-light);margin-top:10px;line-height:1.6">重複URLは自動でスキップします。取り込んだデータはこの端末に保存されます。</p>'+
    '</div>';
}

function renderList(){
  const f=filterSalons(state.salons);
  document.getElementById('listSub').textContent=f.length+'件 / 登録'+state.salons.length+'件';
  const g=Object.values(CATEGORIES);
  const html=
    '<div class="block"><div class="block-label">ジャンル</div><div class="chip-row">'+g.map(x=>'<button type="button" class="chip'+(state.listFilters.genres.includes(x)?' on':'')+'" onclick="toggleListGenre(\''+x+'\')">'+esc(x)+'</button>').join('')+'</div></div>'+
    '<div class="block"><div class="block-label">お気に入り上限</div><div class="chip-row">'+chips([5,10,20,50,100],state.listFilters.maxLikes,'setListLikes')+'</div></div>'+
    '<div class="block"><div class="block-label">最終更新日</div><div class="chip-row">'+
      '<button type="button" class="chip'+(state.listFilters.updatePreset==='off'?' on':'')+'" onclick="setListUpd(\'off\')">指定なし</button>'+
      chips(['7','14','30','90'],state.listFilters.updatePreset,'setListUpd',['7日','14日','30日','90日'])+'</div></div>'+
    (f.length?f.map(s=>'<div class="salon-card"><div class="salon-name"><span class="badge">'+esc(s.genre)+'</span>'+esc(s.name)+'</div><div class="salon-meta">♥ '+s.likes+(s.updatedAt?' · 更新 '+esc(s.updatedAt):'')+(s.address?'<br>'+esc(s.address):'')+'</div></div>').join(''):'<div class="empty">データがありません。<br>「取込」タブからCSVを読み込んでください。</div>');
  document.getElementById('listBody').innerHTML=html;
}

function renderExport(){
  const all=filterSalons(state.salons);
  const sess=filterSalons(state.salons.filter(s=>state.sessionNewUrls.includes(s.url)));
  document.getElementById('exportBody').innerHTML=
    '<div class="stat">今回の新規 '+sess.length+'件 / 表示 '+all.length+'件</div><div style="height:8px"></div>'+
    '<div class="block"><button type="button" class="btn btn-primary" onclick="copyNew()">📋 今回分のみコピー（'+sess.length+'件）</button>'+
    '<button type="button" class="btn btn-secondary" onclick="copyAll()">📋 全件コピー（'+all.length+'件）</button></div>'+
    '<div class="block"><button type="button" class="btn btn-ghost" onclick="saveCsv()">📥 CSVを保存（'+all.length+'件）</button>'+
    '<button type="button" class="btn btn-ghost" onclick="pickCsv()">📂 CSVから復元</button></div>'+
    '<div class="block"><button type="button" class="btn btn-danger" onclick="openSheet(\'clear\')">🗑️ データクリア</button></div>'+
    '<p style="font-size:11px;color:var(--ink-light);line-height:1.6">データはこの端末のlocalStorageに保存されます。ブラウザを閉じても残ります。</p>';
}

function switchScreen(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+n).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('on',b.dataset.screen===n));
  if(n==='import') renderImport();
  if(n==='list') renderList();
  if(n==='export') renderExport();
}
function openSheet(n){ document.getElementById('sheet-bg-'+n).classList.add('open'); document.getElementById('sheet-'+n).classList.add('open'); }
function closeSheet(n){ document.getElementById('sheet-bg-'+n).classList.remove('open'); document.getElementById('sheet-'+n).classList.remove('open'); }

function openStreamlit(){ window.open(STREAMLIT_URL,'_blank','noopener'); }
function pickCsv(){ document.getElementById('csvFile').click(); }
function toggleListGenre(g){ const i=state.listFilters.genres.indexOf(g); if(i>=0) state.listFilters.genres.splice(i,1); else state.listFilters.genres.push(g); save(); renderList(); }
function setListLikes(v){ state.listFilters.maxLikes=+v; save(); renderList(); renderExport(); }
function setListUpd(v){ state.listFilters.updatePreset=v; save(); renderList(); renderExport(); }

async function copyNew(){ const l=filterSalons(state.salons.filter(s=>state.sessionNewUrls.includes(s.url))); if(!l.length){ toast('今回分0件'); return; } await navigator.clipboard.writeText(toTsv(l)); toast('コピーしました'); }
async function copyAll(){ const l=filterSalons(state.salons); if(!l.length){ toast('0件'); return; } await navigator.clipboard.writeText(toTsv(l)); toast('コピーしました'); }
function saveCsv(){
  const l=filterSalons(state.salons); if(!l.length){ toast('0件'); return; }
  const csv='\uFEFF'+toTsv(l).split('\n').map(r=>r.split('\t').map(c=>'"'+c.replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'}); const f=new File([blob],'salons_'+todayStr()+'.csv',{type:'text/csv'});
  if(navigator.canShare&&navigator.canShare({files:[f]})){ navigator.share({files:[f]}).catch(()=>{}); toast('共有を開きました'); return; }
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=f.name; a.click();
  toast('CSV保存');
}
function onCsvFile(ev){
  const file=ev.target.files[0]; ev.target.value=''; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{
    const text=String(r.result).replace(/^\uFEFF/,'');
    const lines=text.split(/\r?\n/).filter(Boolean);
    if(lines.length<2){ toast('CSVが空です'); return; }
    const d=lines[0].includes('\t')?'\t':',';
    const h=parseCsvLine(lines[0],d);
    const rows=[];
    for(let i=1;i<lines.length;i++){
      const c=parseCsvLine(lines[i],d);
      const o={}; h.forEach((k,j)=>o[k.trim()]=c[j]||''); rows.push(o);
    }
    const n=addFromRows(rows);
    toast(n?n+'件追加':'新規なし（重複のみ）');
    renderImport(); renderList(); renderExport();
    if(n) switchScreen('list');
  };
  r.readAsText(file);
}
function parseCsvLine(line, delim){
  if(delim!==',') return line.split(delim);
  const out=[]; let cur=''; let q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){ if(q&&line[i+1]==='"'){ cur+='"'; i++; } else q=!q; continue; }
    if(ch===','&&!q){ out.push(cur); cur=''; continue; }
    cur+=ch;
  }
  out.push(cur); return out;
}
function confirmClear(){ state.salons=[]; state.sessionNewUrls=[]; save(); closeSheet('clear'); toast('削除しました'); renderImport(); renderList(); renderExport(); }

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
load(); renderImport(); renderList(); renderExport();
</script>
</body>
</html>
