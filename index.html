<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#D4536F">
<title>ミニモサロン帳</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<link rel="icon" href="icon-192.svg" type="image/svg+xml">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FAF7F8;--card:#fff;--ink:#2D2A2B;--ink-soft:#6B6568;--ink-light:#A39DA0;
  --accent:#D4536F;--accent-soft:#FCE8ED;--line:#EDE8EA;--ok:#2E9E6A;
  --nav-h:72px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  --radius:16px;--font:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--ink);overflow:hidden}
body{display:flex;flex-direction:column}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;padding-top:var(--safe-top);z-index:1}
.screen.active{display:flex}
.scroll-body{flex:1;overflow-y:auto;padding:0 16px calc(var(--nav-h) + var(--safe-bottom) + 16px);-webkit-overflow-scrolling:touch}
.page-head{padding:16px 16px 8px}
.page-title{font-size:21px;font-weight:800}
.page-sub{font-size:12px;color:var(--ink-soft);margin-top:4px;line-height:1.5}
.block{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.block-label{font-size:11px;font-weight:700;color:var(--ink-soft);margin-bottom:8px}
.chip-row{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:8px 12px;border-radius:999px;border:1.5px solid var(--line);background:#fff;font-size:12px;font-weight:700;color:var(--ink-soft)}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chip:disabled{opacity:.45}
.btn{display:flex;align-items:center;justify-content:center;width:100%;padding:14px;border-radius:14px;border:none;font:inherit;font-size:15px;font-weight:800;cursor:pointer;touch-action:manipulation}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--accent-soft);color:var(--accent)}
.btn-ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
.btn-danger{background:#FFF0F0;color:#C43D3D;border:1.5px solid #F5D0D0}
.btn+.btn{margin-top:8px}
.btn:disabled{opacity:.5}
.log-box{background:#1e1e1e;color:#d4d4d4;border-radius:12px;padding:12px;font-size:11px;line-height:1.55;max-height:200px;overflow-y:auto;white-space:pre-wrap;font-family:ui-monospace,Menlo,monospace}
.stat{font-size:12px;font-weight:700;color:var(--accent);margin-top:8px}
.salon-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:8px}
.salon-name{font-size:15px;font-weight:800;margin-bottom:4px}
.salon-meta{font-size:12px;color:var(--ink-soft);line-height:1.55}
.badge{display:inline-block;background:var(--accent-soft);color:var(--accent);font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;margin-right:6px}
.empty{padding:36px 12px;text-align:center;color:var(--ink-light);font-size:13px;line-height:1.7}
.bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:20;display:flex;background:#fff;border-top:1px solid var(--line);padding-bottom:var(--safe-bottom);height:calc(var(--nav-h) + var(--safe-bottom))}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;font:inherit;font-size:10px;font-weight:700;color:var(--ink-light)}
.nav-btn svg{width:22px;height:22px}
.nav-btn.on{color:var(--accent)}
.sheet-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:30}
.sheet-bg.open{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:31;background:#fff;border-radius:18px 18px 0 0;padding:12px 16px calc(18px + var(--safe-bottom));transform:translateY(110%);transition:transform .25s;max-height:80vh;overflow-y:auto}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--line);border-radius:99px;margin:0 auto 12px}
.sheet-title{font-size:16px;font-weight:800;margin-bottom:10px}
.pref-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pref-item{padding:10px;border:1.5px solid var(--line);border-radius:12px;font-size:13px;font-weight:700;text-align:center}
.pref-item.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.toast{position:fixed;left:50%;bottom:calc(var(--nav-h) + var(--safe-bottom) + 12px);transform:translateX(-50%) translateY(120px);opacity:0;background:rgba(45,42,43,.9);color:#fff;padding:9px 16px;border-radius:999px;font-size:12px;font-weight:700;z-index:40;transition:.25s}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
input[type=file]{display:none}
</style>
</head>
<body>

<div class="screen active" id="screen-search">
  <div class="page-head">
    <div class="page-title">ミニモ検索</div>
    <div class="page-sub">旧Streamlit版と同じ条件で検索（データは端末に保存）</div>
    <div class="stat" id="searchStat"></div>
  </div>
  <div class="scroll-body" id="searchBody"></div>
</div>

<div class="screen" id="screen-list">
  <div class="page-head">
    <div class="page-title">サロンリスト</div>
    <div class="page-sub" id="listSub">登録データ一覧</div>
  </div>
  <div class="scroll-body" id="listBody"></div>
</div>

<div class="screen" id="screen-export">
  <div class="page-head">
    <div class="page-title">出力</div>
    <div class="page-sub">スプシコピー・CSV・復元</div>
  </div>
  <div class="scroll-body" id="exportBody"></div>
</div>

<nav class="bottom-nav">
  <button type="button" class="nav-btn on" data-screen="search" onclick="switchScreen('search')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><span>検索</span>
  </button>
  <button type="button" class="nav-btn" data-screen="list" onclick="switchScreen('list')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg><span>リスト</span>
  </button>
  <button type="button" class="nav-btn" data-screen="export" onclick="switchScreen('export')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15V3M7 10l5 5 5-5M5 21h14"/></svg><span>出力</span>
  </button>
</nav>

<div class="sheet-bg" id="sheet-bg-prefs" onclick="closeSheet('prefs')"></div>
<div class="sheet" id="sheet-prefs">
  <div class="sheet-handle"></div>
  <div class="sheet-title">その他の都道府県</div>
  <div class="pref-grid" id="otherPrefGrid"></div>
  <button type="button" class="btn btn-primary" style="margin-top:12px" onclick="closeSheet('prefs')">完了</button>
</div>

<div class="sheet-bg" id="sheet-bg-clear" onclick="closeSheet('clear')"></div>
<div class="sheet" id="sheet-clear">
  <div class="sheet-handle"></div>
  <div class="sheet-title">すべてのデータを削除しますか？</div>
  <p style="font-size:13px;color:var(--ink-soft);margin-bottom:14px;line-height:1.6">端末に保存したサロンがすべて消えます。</p>
  <button type="button" class="btn btn-danger" onclick="confirmClear()">削除する</button>
  <button type="button" class="btn btn-ghost" onclick="closeSheet('clear')">キャンセル</button>
</div>

<input type="file" id="csvFile" accept=".csv,text/csv" onchange="onCsvFile(event)">
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'minimo_salon_v2';
const SORT_NEWEST = 139;
const CATEGORIES = { nail:'ネイル', eyelash:'マツエク・マツパ', eyebrow:'眉毛', relaxation:'エステ・リラク', other:'その他美容' };
const CAT_KEYS = Object.keys(CATEGORIES);
const CATEGORY_CODES = { nail:2, eyelash:3, relaxation:4, eyebrow:5 };
const KANSAI = ['大阪府','京都府','兵庫県','奈良県','滋賀県','和歌山県'];
const PREFECTURES = ['北海道','青森県','岩手県','秋田県','山形県','宮城県','福島県','茨城県','栃木県','群馬県','埼玉県','千葉県','東京都','神奈川県','新潟県','富山県','石川県','福井県','山梨県','長野県','岐阜県','静岡県','愛知県','三重県','滋賀県','京都府','大阪府','兵庫県','奈良県','和歌山県','鳥取県','島根県','岡山県','広島県','山口県','徳島県','香川県','愛媛県','高知県','福岡県','佐賀県','長崎県','熊本県','大分県','宮崎県','鹿児島県','沖縄県'];
const PREF_CODES = {北海道:1,青森県:2,岩手県:3,宮城県:4,秋田県:5,山形県:6,福島県:7,茨城県:8,栃木県:9,群馬県:10,埼玉県:11,千葉県:12,東京都:13,神奈川県:14,新潟県:15,富山県:16,石川県:17,福井県:18,山梨県:19,長野県:20,岐阜県:21,静岡県:22,愛知県:23,三重県:24,滋賀県:25,京都府:26,大阪府:27,兵庫県:28,奈良県:29,和歌山県:30,鳥取県:31,島根県:32,岡山県:33,広島県:34,山口県:35,徳島県:36,香川県:37,愛媛県:38,高知県:39,福岡県:40,佐賀県:41,長崎県:42,熊本県:43,大分県:44,宮崎県:45,鹿児島県:46,沖縄県:47};

const state = {
  salons: [],
  sessionNewUrls: [],
  scrapeLog: [],
  scraping: false,
  settings: {
    categories: [],
    maxLikes: 5,
    maxPages: 20,
    fetchPhone: true,
    filterUpdated: false,
    updatePreset: '30',
    updateMin: '',
    updateMax: '',
    mode: 'pref',
    kansai: [],
    otherPrefs: []
  },
  listFilters: { genres: [], maxLikes: 100, updatePreset: 'off' }
};

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('show'),2200); }

function load(){
  try{
    const d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');
    if(d){ if(d.salons) state.salons=d.salons; if(d.settings) Object.assign(state.settings,d.settings); if(d.listFilters) Object.assign(state.listFilters,d.listFilters); }
  }catch(e){}
  migrate();
}
function migrate(){
  const old=localStorage.getItem('minimo_salon_app_v1');
  if(old && !state.salons.length){ try{ const d=JSON.parse(old); if(d.salons) state.salons=d.salons; save(); }catch(e){} }
  state.salons=dedupe(state.salons);
}
function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ salons:state.salons, settings:state.settings, listFilters:state.listFilters }));
}

function dedupe(list){
  const m=new Map();
  list.forEach(s=>{ if(s&&s.url){ const p=m.get(s.url); if(!p||(s.fetchedAt||'')>(p.fetchedAt||'')) m.set(s.url,s); }});
  return [...m.values()];
}

function selectedPrefs(){
  if(state.settings.mode==='nationwide') return [];
  return [...state.settings.kansai,...state.settings.otherPrefs];
}
function activeCats(){
  return state.settings.categories.length ? state.settings.categories : CAT_KEYS;
}
function updateRange(){
  if(!state.settings.filterUpdated) return null;
  const p=state.settings.updatePreset;
  if(p==='custom') return { min:state.settings.updateMin, max:state.settings.updateMax };
  const days=parseInt(p,10); const max=todayStr();
  const d=new Date(); d.setDate(d.getDate()-days);
  const min=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  return {min,max};
}

async function fetchHtml(url){
  const urls=[
    'https://api.allorigins.win/raw?url='+encodeURIComponent(url),
    'https://corsproxy.io/?'+encodeURIComponent(url)
  ];
  let lastErr;
  for(const u of urls){
    try{
      const res=await fetch(u,{signal:AbortSignal.timeout(28000)});
      if(res.ok) return await res.text();
    }catch(e){ lastErr=e; }
    await sleep(400);
  }
  throw lastErr||new Error('fetch failed');
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function getListUrl(cat,pref,page){
  const base='https://minimodel.jp/list/'+CATEGORY_CODES[cat]+'/'+PREF_CODES[pref]+'/c0/'+SORT_NEWEST;
  return page<=1?base:base+(base.includes('?')?'&':'?')+'p='+page;
}
function getSearchUrl(cat,pref,page){
  let u='https://minimodel.jp/search?category='+cat+'&keyword='+encodeURIComponent(pref)+'&order=updated_datetime';
  if(page>1) u+='&p='+page;
  return u;
}

function extractSalons(html, catKey){
  const doc=new DOMParser().parseFromString(html,'text/html');
  const results=[]; const seen=new Set();
  doc.querySelectorAll('a[href^="/r/"]').forEach(link=>{
    const href=(link.getAttribute('href')||'').split('?')[0];
    if(!/^\/r\/[A-Za-z0-9]+$/.test(href)) return;
    const url='https://minimodel.jp'+href;
    if(seen.has(url)) return;
    let parent=link, text='';
    for(let i=0;i<12;i++){
      parent=parent.parentElement; if(!parent) break;
      const pt=parent.innerText||'';
      if(pt.length>80&&pt.length<5000){ text=pt; break; }
    }
    if(!text) return;
    let favorites=-1;
    const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
    for(let i=0;i<lines.length-2;i++){
      if((/^[\d.]+$/.test(lines[i])||lines[i]==='-') && (/^[\d,]+$/.test(lines[i+1])||lines[i+1]==='-') && /^[\d,]+$/.test(lines[i+2])){
        favorites=parseInt(lines[i+2].replace(/,/g,''),10); break;
      }
    }
    if(favorites<0){ const m=text.match(/-\s*\n\s*-\s*\n\s*(\d+)/); if(m) favorites=parseInt(m[1],10); }
    if(favorites<0){ const m=text.match(/お気に入り[：:]?\s*(\d+)/); if(m) favorites=parseInt(m[1],10); }
    if(favorites<0&&text.includes('詳細を見る')) favorites=0;
    if(favorites<0) return;
    let name='';
    parent.querySelectorAll('a[href*="/r/"]').forEach(nl=>{
      const lt=(nl.getAttribute('name')||nl.innerText||'').trim();
      if(lt.includes('さんの詳細を見る')) name=lt.replace('さんの詳細を見る','').trim();
    });
    if(!name){
      for(const line of lines){
        if(line.length>2&&line.length<50&&!/^[\d.,¥]/.test(line)&&!line.includes('経験年数')&&!line.includes('詳細を見る')&&!line.includes('駅')){ name=line; break; }
      }
    }
    if(!name) return;
    seen.add(url);
    results.push({ name, url, favorites, category_key:catKey, genre:CATEGORIES[catKey]||'美容' });
  });
  const byUrl=new Map();
  results.forEach(r=>{ const p=byUrl.get(r.url); if(!p||r.favorites>p.favorites) byUrl.set(r.url,r); });
  return [...byUrl.values()];
}

function parseDetail(html){
  const doc=new DOMParser().parseFromString(html,'text/html');
  const body=doc.body.innerText||'';
  let updatedAt='';
  const time=doc.querySelector('time[datetime]');
  if(time) updatedAt=(time.getAttribute('datetime')||'').slice(0,10);
  if(!updatedAt){ const m=body.match(/(\d{4})年(\d{1,2})月(\d{1,2})日\s*更新/); if(m) updatedAt=m[1]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0'); }
  let address='';
  for(const line of body.split('\n')){
    const l=line.trim();
    if(!l.includes('(地図)')) continue;
    const a=l.replace(/\s*\(地図\)\s*$/,'').trim();
    if(/(?:都|道|府|県)/.test(a)&&a.length>7){ address=a; break; }
  }
  let phone='';
  if(state.settings.fetchPhone){
    const m=body.match(/0\d{9,10}/);
    if(m) phone=m[0];
  }
  let pref='';
  for(const p of PREFECTURES){ if(address.startsWith(p)){ pref=p; break; } }
  return { updatedAt, address, phone, prefecture:pref };
}

function passesUpdate(updatedAt){
  const r=updateRange();
  if(!r||!updatedAt) return !r;
  return updatedAt>=r.min && updatedAt<=r.max;
}

function log(msg){
  state.scrapeLog.push(msg);
  if(state.scrapeLog.length>40) state.scrapeLog.shift();
  const el=document.getElementById('scrapeLog');
  if(el) el.textContent=state.scrapeLog.join('\n');
}

async function scrape(){
  if(state.scraping) return;
  if(state.settings.mode==='pref' && !selectedPrefs().length){ toast('都道府県を選んでください'); return; }
  state.scraping=true; state.scrapeLog=[]; state.sessionNewUrls=[];
  renderSearch();
  const existing=new Set(state.salons.map(s=>s.url));
  let added=0;
  try{
    const cats=activeCats();
    const prefs=state.settings.mode==='nationwide'?['全国']:selectedPrefs();
    for(const pref of (state.settings.mode==='nationwide'?['__nationwide__']:prefs)){
      for(const cat of cats){
        for(let page=1; page<=state.settings.maxPages; page++){
          log('📄 '+((state.settings.mode==='nationwide')?'全国':pref)+' '+CATEGORIES[cat]+' p'+page);
          let html;
          try{
            const url=(cat==='other'||!CATEGORY_CODES[cat])
              ? getSearchUrl('other', pref==='__nationwide__'?'':pref, page)
              : (state.settings.mode==='nationwide'
                ? 'https://minimodel.jp/search?category='+cat+'&order=updated_datetime'+(page>1?'&p='+page:'')
                : getListUrl(cat,pref,page));
            html=await fetchHtml(url);
          }catch(e){ log('⚠️ 取得失敗'); break; }
          const salons=extractSalons(html,cat);
          if(!salons.length) break;
          const matching=salons.filter(s=>s.favorites<=state.settings.maxLikes && !existing.has(s.url));
          for(const s of matching){
            log('🔍 '+s.name.slice(0,18));
            let detail;
            try{ detail=parseDetail(await fetchHtml(s.url)); }catch(e){ continue; }
            if(state.settings.mode==='pref' && detail.prefecture && detail.prefecture!==pref) continue;
            if(!passesUpdate(detail.updatedAt)) continue;
            const row={
              id:uid(), name:s.name, genre:s.genre||CATEGORIES[cat], address:detail.address||'',
              phone:detail.phone||'', url:s.url, likes:s.favorites,
              updatedAt:detail.updatedAt||'', fetchedAt:todayStr()
            };
            state.salons.push(row); existing.add(s.url); state.sessionNewUrls.push(s.url); added++;
            log('✨ '+row.name.slice(0,16)+' ♥'+row.likes);
            save();
            await sleep(350);
          }
          await sleep(500);
        }
      }
    }
    state.salons=dedupe(state.salons);
    save();
    log('✅ 完了 +'+added+'件');
    toast(added?added+'件追加':'新規なし');
  }catch(e){
    log('❌ '+e.message); toast('エラーが発生しました');
  }
  state.scraping=false;
  renderSearch(); renderList(); renderExport();
  if(added) switchScreen('list');
}

function addFromRows(rows){
  const existing=new Set(state.salons.map(s=>s.url)); let n=0;
  rows.forEach(r=>{
    const url=String(r.url||r['サロンURL']||'').trim(); if(!url||existing.has(url)) return;
    state.salons.push({
      id:uid(), name:String(r.name||r['サロン名']||'').trim(),
      genre:String(r.genre||r['ジャンル']||'その他美容').trim(),
      address:String(r.address||r['住所']||'').trim(),
      phone:String(r.phone||r['電話番号']||'').replace(/\D/g,''),
      url, likes:parseInt(r.likes||r['いいね数']||0,10)||0,
      updatedAt:String(r.updatedAt||r['最終更新日']||'').slice(0,10),
      fetchedAt:todayStr()
    });
    existing.add(url); state.sessionNewUrls.push(url); n++;
  });
  state.salons=dedupe(state.salons); save(); return n;
}

function filterSalons(list){
  let out=list.slice();
  if(state.listFilters.genres.length) out=out.filter(s=>state.listFilters.genres.includes(s.genre));
  out=out.filter(s=>s.likes<=state.listFilters.maxLikes);
  if(state.listFilters.updatePreset!=='off'){
    const days=parseInt(state.listFilters.updatePreset,10);
    const d=new Date(); d.setDate(d.getDate()-days);
    const min=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    out=out.filter(s=>s.updatedAt&&s.updatedAt>=min);
  }
  return out.sort((a,b)=>(b.updatedAt||'').localeCompare(a.updatedAt||'')||a.likes-b.likes);
}

function toTsv(list){
  const h=['サロン名','ジャンル','住所','電話番号','サロンURL','いいね数','最終更新日','取得日時'];
  const lines=[h.join('\t')];
  list.forEach(s=>{
    const ph=s.phone?("'"+s.phone):'';
    lines.push([s.name,s.genre,s.address,ph,s.url,s.likes,s.updatedAt,s.fetchedAt].join('\t'));
  });
  return lines.join('\n');
}

function chips(vals, selected, fn, labels){
  return vals.map((v,i)=>{
    const on=(Array.isArray(selected)?selected.includes(v):selected===v)?' on':'';
    const label=labels?labels[i]:v;
    return '<button type="button" class="chip'+on+'" onclick="'+fn+'(\''+v+'\')">'+esc(label)+'</button>';
  }).join('');
}

function renderSearch(){
  const s=state.settings;
  document.getElementById('searchStat').textContent='登録 '+state.salons.length+'件';
  const catHtml=CAT_KEYS.map(k=>'<button type="button" class="chip'+(s.categories.includes(k)?' on':'')+'" onclick="toggleCat(\''+k+'\')">'+esc(CATEGORIES[k])+'</button>').join('');
  const kansaiHtml=KANSAI.map(p=>'<button type="button" class="chip'+(s.kansai.includes(p)?' on':'')+'" onclick="toggleKansai(\''+p+'\')">'+esc(p)+'</button>').join('');
  document.getElementById('searchBody').innerHTML=
    '<div class="block"><div class="block-label">カテゴリ（未選択=全て）</div><div class="chip-row">'+catHtml+'</div></div>'+
    '<div class="block"><div class="block-label">お気に入り上限</div><div class="chip-row">'+chips([1,5,10,20,50,100],s.maxLikes,'setMaxLikes')+'</div></div>'+
    '<div class="block"><div class="block-label">検索ページ数</div><div class="chip-row">'+chips([5,10,20],s.maxPages,'setMaxPages')+'</div></div>'+
    '<div class="block"><div class="block-label">電話番号</div><div class="chip-row"><button type="button" class="chip'+(s.fetchPhone?' on':'')+'" onclick="togglePhone()">'+(s.fetchPhone?'取得する':'取得しない')+'</button></div></div>'+
    '<div class="block"><div class="block-label">最終更新日（検索時）</div><div class="chip-row">'+
      '<button type="button" class="chip'+(!s.filterUpdated?' on':'')+'" onclick="setUpdFilter(false)">指定なし</button>'+
      chips(['7','14','30','90'],s.filterUpdated?s.updatePreset:'','setUpdPreset',['7日','14日','30日','90日'])+'</div></div>'+
    '<div class="block"><div class="block-label">検索モード</div><div class="chip-row">'+
      '<button type="button" class="chip'+(s.mode==='pref'?' on':'')+'" onclick="setMode(\'pref\')">都道府県</button>'+
      '<button type="button" class="chip'+(s.mode==='nationwide'?' on':'')+'" onclick="setMode(\'nationwide\')">全国</button></div></div>'+
    (s.mode==='pref'?'<div class="block"><div class="block-label">関西</div><div class="chip-row">'+kansaiHtml+'</div>'+
      '<button type="button" class="btn btn-ghost" style="margin-top:8px" onclick="openSheet(\'prefs\')">その他の都道府県 ('+s.otherPrefs.length+')</button></div>':'')+
    '<button type="button" class="btn btn-primary" id="btnScrape" '+(state.scraping?'disabled':'')+' onclick="scrape()">'+(state.scraping?'検索中...':'🔍 スクレイピング開始')+'</button>'+
    '<div style="height:10px"></div><div class="log-box" id="scrapeLog">'+(state.scrapeLog.join('\n')||'ログはここに表示されます')+'</div>';
  renderOtherPrefs();
}

function renderOtherPrefs(){
  const grid=document.getElementById('otherPrefGrid');
  if(!grid) return;
  const others=PREFECTURES.filter(p=>!KANSAI.includes(p));
  grid.innerHTML=others.map(p=>'<button type="button" class="pref-item'+(state.settings.otherPrefs.includes(p)?' on':'')+'" onclick="toggleOther(\''+p+'\')">'+esc(p)+'</button>').join('');
}

function renderList(){
  const f=filterSalons(state.salons);
  document.getElementById('listSub').textContent=f.length+'件 / 登録'+state.salons.length+'件';
  const g=Object.values(CATEGORIES);
  const html=
    '<div class="block"><div class="block-label">ジャンル</div><div class="chip-row">'+g.map(x=>'<button type="button" class="chip'+(state.listFilters.genres.includes(x)?' on':'')+'" onclick="toggleListGenre(\''+x+'\')">'+esc(x)+'</button>').join('')+'</div></div>'+
    '<div class="block"><div class="block-label">お気に入り上限</div><div class="chip-row">'+chips([5,10,20,50,100],state.listFilters.maxLikes,'setListLikes')+'</div></div>'+
    '<div class="block"><div class="block-label">最終更新日</div><div class="chip-row">'+
      '<button type="button" class="chip'+(state.listFilters.updatePreset==='off'?' on':'')+'" onclick="setListUpd(\'off\')">指定なし</button>'+
      chips(['7','14','30','90'],state.listFilters.updatePreset,'setListUpd',['7日','14日','30日','90日'])+'</div></div>'+
    (f.length?f.map(s=>'<div class="salon-card"><div class="salon-name"><span class="badge">'+esc(s.genre)+'</span>'+esc(s.name)+'</div><div class="salon-meta">♥ '+s.likes+(s.updatedAt?' · 更新 '+esc(s.updatedAt):'')+(s.address?'<br>'+esc(s.address):'')+'</div></div>').join(''):'<div class="empty">データがありません。<br>「検索」タブからスクレイピングしてください。</div>');
  document.getElementById('listBody').innerHTML=html;
}

function renderExport(){
  const all=filterSalons(state.salons);
  const sess=filterSalons(state.salons.filter(s=>state.sessionNewUrls.includes(s.url)));
  document.getElementById('exportBody').innerHTML=
    '<div class="stat">今回の新規 '+sess.length+'件 / 表示 '+all.length+'件</div><div style="height:8px"></div>'+
    '<div class="block"><button type="button" class="btn btn-primary" onclick="copyNew()">📋 今回分のみコピー（'+sess.length+'件）</button>'+
    '<button type="button" class="btn btn-secondary" onclick="copyAll()">📋 全件コピー（'+all.length+'件）</button></div>'+
    '<div class="block"><button type="button" class="btn btn-ghost" onclick="saveCsv()">📥 CSVを保存（'+all.length+'件）</button>'+
    '<button type="button" class="btn btn-ghost" onclick="document.getElementById(\'csvFile\').click()">📂 CSVから復元</button></div>'+
    '<div class="block"><button type="button" class="btn btn-danger" onclick="openSheet(\'clear\')">🗑️ データクリア</button></div>'+
    '<p style="font-size:11px;color:var(--ink-light);line-height:1.6">データはこの端末のlocalStorageに保存されます。ブラウザを閉じても残ります。</p>';
}

function switchScreen(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+n).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('on',b.dataset.screen===n));
  if(n==='search') renderSearch();
  if(n==='list') renderList();
  if(n==='export') renderExport();
}
function openSheet(n){ document.getElementById('sheet-bg-'+n).classList.add('open'); document.getElementById('sheet-'+n).classList.add('open'); }
function closeSheet(n){ document.getElementById('sheet-bg-'+n).classList.remove('open'); document.getElementById('sheet-'+n).classList.remove('open'); }

function toggleCat(k){ const i=state.settings.categories.indexOf(k); if(i>=0) state.settings.categories.splice(i,1); else state.settings.categories.push(k); save(); renderSearch(); }
function setMaxLikes(v){ state.settings.maxLikes=+v; save(); renderSearch(); }
function setMaxPages(v){ state.settings.maxPages=+v; save(); renderSearch(); }
function togglePhone(){ state.settings.fetchPhone=!state.settings.fetchPhone; save(); renderSearch(); }
function setUpdFilter(on){ state.settings.filterUpdated=on; if(on&&!['7','14','30','90'].includes(state.settings.updatePreset)) state.settings.updatePreset='30'; save(); renderSearch(); }
function setUpdPreset(v){ state.settings.filterUpdated=true; state.settings.updatePreset=v; save(); renderSearch(); }
function setMode(m){ state.settings.mode=m; save(); renderSearch(); }
function toggleKansai(p){ const i=state.settings.kansai.indexOf(p); if(i>=0) state.settings.kansai.splice(i,1); else state.settings.kansai.push(p); save(); renderSearch(); }
function toggleOther(p){ const i=state.settings.otherPrefs.indexOf(p); if(i>=0) state.settings.otherPrefs.splice(i,1); else state.settings.otherPrefs.push(p); save(); renderOtherPrefs(); renderSearch(); }
function toggleListGenre(g){ const i=state.listFilters.genres.indexOf(g); if(i>=0) state.listFilters.genres.splice(i,1); else state.listFilters.genres.push(g); save(); renderList(); }
function setListLikes(v){ state.listFilters.maxLikes=+v; save(); renderList(); renderExport(); }
function setListUpd(v){ state.listFilters.updatePreset=v; save(); renderList(); renderExport(); }

async function copyNew(){ const l=filterSalons(state.salons.filter(s=>state.sessionNewUrls.includes(s.url))); if(!l.length){ toast('今回分0件'); return; } await navigator.clipboard.writeText(toTsv(l)); toast('コピーしました'); }
async function copyAll(){ const l=filterSalons(state.salons); if(!l.length){ toast('0件'); return; } await navigator.clipboard.writeText(toTsv(l)); toast('コピーしました'); }
function saveCsv(){
  const l=filterSalons(state.salons); if(!l.length){ toast('0件'); return; }
  const csv='\uFEFF'+toTsv(l).split('\n').map(r=>r.split('\t').map(c=>'"'+c.replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'}); const f=new File([blob],'salons_'+todayStr()+'.csv',{type:'text/csv'});
  if(navigator.canShare&&navigator.canShare({files:[f]})){ navigator.share({files:[f]}).catch(()=>{}); toast('共有を開きました'); return; }
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=f.name; a.click();
  toast('CSV保存');
}
function onCsvFile(ev){
  const file=ev.target.files[0]; ev.target.value=''; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{ const lines=String(r.result).replace(/^\uFEFF/,'').split(/\r?\n/).filter(Boolean);
    const d=lines[0].includes('\t')?'\t':','; const h=lines[0].split(d); const rows=[];
    for(let i=1;i<lines.length;i++){ const c=lines[i].split(d); const o={}; h.forEach((k,j)=>o[k.trim()]=c[j]||''); rows.push(o); }
    const n=addFromRows(rows); toast(n+'件追加'); renderList(); renderExport(); };
  r.readAsText(file);
}
function confirmClear(){ state.salons=[]; state.sessionNewUrls=[]; save(); closeSheet('clear'); toast('削除しました'); renderSearch(); renderList(); renderExport(); }

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
load(); renderSearch(); renderList(); renderExport();
</script>
